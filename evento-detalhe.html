    <main>
      <section class="section">
        <div class="container">
          <div class="event-details-grid">
            <article class="event-content">
              <img
                id="event-image"
                src="assets/images/placeholder.jpg"
                alt="Evento"
                style="border-radius: 24px; margin-bottom: 30px"
              />

              <h1 id="event-title">Carregando título...</h1>
              <div
                id="event-description"
                class="muted"
                style="font-size: 18px; line-height: 1.8"
              >
                <p>Carregando descrição do evento...</p>
              </div>
            </article>

            <aside class="event-sidebar">
              <div class="event-info-card">
                <h5>Detalhes do Evento</h5>
                <ul class="event-meta-list">
                  <li>
                    <i class="fa-solid fa-calendar-days"></i>
                    <strong>Data:</strong> <span id="event-date">--</span>
                  </li>
                  <li>
                    <i class="fa-solid fa-clock"></i> <strong>Horário:</strong>
                    <span id="event-time">--</span>
                  </li>
                  <li>
                    <i class="fa-solid fa-location-dot"></i>
                    <strong>Local:</strong> <span id="event-location">--</span>
                  </li>
                </ul>
                <a
                  href="#"
                  id="event-register-link"
                  class="btn-primary"
                  style="width: 100%"
                  >Inscrever-se</a
                >
              </div>
            </aside>
          </div>
        </div>
      </section>
